<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinLife — 财务人生模拟器</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
</head>
<body>
<div id="app">
  <header>
    <h1>FinLife</h1>
    <p class="subtitle">蒙特卡洛财务人生模拟器</p>
  </header>

  <div class="main-layout">
    <!-- ─── Left: Config Panel ─── -->
    <section class="config-panel" id="configPanel">
      <div class="panel-header">
        <h2>配置</h2>
        <div class="config-actions">
          <button id="toggleModeBtn" class="btn btn-sm">专家模式</button>
          <button id="loadDefaultBtn" class="btn btn-sm" title="恢复默认配置">重置</button>
        </div>
      </div>

      <!-- ═══ Form Mode ═══ -->
      <div id="formMode" class="config-form">
        <!-- Section: 模拟参数 -->
        <details class="cfg-section" open>
          <summary>模拟参数</summary>
          <div class="section-body">
            <div class="field-row">
              <label>起始年<input type="number" id="f_start_year" value="2027" class="fnum"></label>
              <label>结束年<input type="number" id="f_end_year" value="2060" class="fnum"></label>
            </div>
            <div class="field-row">
              <label>随机种子<input type="number" id="f_seed" value="123" class="fnum"></label>
              <label class="chk-label"><input type="checkbox" id="f_inflation_adj"> 排除通胀 (实际购买力)</label>
            </div>
          </div>
        </details>

        <!-- Section: 初始资产 -->
        <details class="cfg-section" open>
          <summary>初始资产</summary>
          <div class="section-body">
            <div class="field-row">
              <label>现金<input type="number" id="f_cash" value="300000" class="fnum"></label>
              <label>投资<input type="number" id="f_investments" value="150000" class="fnum"></label>
            </div>
            <div class="field-row">
              <label>房产<input type="number" id="f_real_estate" value="0" class="fnum"></label>
              <label>其他资产<input type="number" id="f_other_assets" value="0" class="fnum"></label>
            </div>
            <div class="field-row">
              <label>负债<input type="number" id="f_liabilities" value="0" class="fnum"></label>
            </div>
            <div class="assets-summary" id="assetsSummary">
              <span>总资产: <strong id="totalAssetsDisplay">450,000</strong></span>
              <span>净资产: <strong id="netAssetsDisplay">450,000</strong></span>
            </div>
          </div>
        </details>

        <!-- Section: 工资收入 -->
        <details class="cfg-section" open>
          <summary>工资收入</summary>
          <div class="section-body">
            <div class="field-row">
              <label>基准值<input type="number" id="f_salary_val" value="400000" class="fnum"></label>
              <label>分布
                <select id="f_salary_dist" class="fdist">
                  <option value="fixed">固定值</option>
                  <option value="normal" selected>正态 N</option>
                  <option value="uniform">均匀 U</option>
                </select>
              </label>
            </div>
            <div class="dist-params" data-target="f_salary_dist">
              <div class="field-row" data-dist="normal" style="display:flex">
                <label>均值<input type="number" id="f_salary_n_mean" value="400000" class="fnum"></label>
                <label>标准差<input type="number" id="f_salary_n_std" value="40000" class="fnum"></label>
              </div>
              <div class="field-row" data-dist="uniform" style="display:none">
                <label>下限<input type="number" id="f_salary_u_lo" value="360000" class="fnum"></label>
                <label>上限<input type="number" id="f_salary_u_hi" value="440000" class="fnum"></label>
              </div>
            </div>
            <div class="field-row">
              <label>年增长率<input type="number" id="f_salary_ann" value="3" class="fnum pct" step="0.1"> %</label>
            </div>
          </div>
        </details>

        <!-- Section: 生活支出 -->
        <details class="cfg-section" open>
          <summary>生活支出</summary>
          <div class="section-body">
            <div class="field-row">
              <label>基准值<input type="number" id="f_expense_val" value="100000" class="fnum"></label>
              <label>分布
                <select id="f_expense_dist" class="fdist">
                  <option value="fixed">固定值</option>
                  <option value="normal" selected>正态 N</option>
                  <option value="uniform">均匀 U</option>
                </select>
              </label>
            </div>
            <div class="dist-params" data-target="f_expense_dist">
              <div class="field-row" data-dist="normal" style="display:flex">
                <label>均值<input type="number" id="f_expense_n_mean" value="100000" class="fnum"></label>
                <label>标准差<input type="number" id="f_expense_n_std" value="10000" class="fnum"></label>
              </div>
              <div class="field-row" data-dist="uniform" style="display:none">
                <label>下限<input type="number" id="f_expense_u_lo" value="90000" class="fnum"></label>
                <label>上限<input type="number" id="f_expense_u_hi" value="110000" class="fnum"></label>
              </div>
            </div>
            <div class="field-row">
              <label>年增长率<input type="number" id="f_expense_ann" value="3" class="fnum pct" step="0.1"> %</label>
            </div>
          </div>
        </details>

        <!-- Section: 投资回报率 -->
        <details class="cfg-section" open>
          <summary>投资回报率</summary>
          <div class="section-body">
            <div class="field-row">
              <label>基准值<input type="number" id="f_invret_val" value="8" class="fnum pct" step="0.1"> %</label>
              <label>分布
                <select id="f_invret_dist" class="fdist">
                  <option value="fixed">固定值</option>
                  <option value="normal" selected>正态 N</option>
                  <option value="uniform">均匀 U</option>
                </select>
              </label>
            </div>
            <div class="dist-params" data-target="f_invret_dist">
              <div class="field-row" data-dist="normal" style="display:flex">
                <label>均值<input type="number" id="f_invret_n_mean" value="8" class="fnum pct" step="0.1"> %</label>
                <label>标准差<input type="number" id="f_invret_n_std" value="18" class="fnum pct" step="0.1"> %</label>
              </div>
              <div class="field-row" data-dist="uniform" style="display:none">
                <label>下限<input type="number" id="f_invret_u_lo" value="5" class="fnum pct" step="0.1"> %</label>
                <label>上限<input type="number" id="f_invret_u_hi" value="11" class="fnum pct" step="0.1"> %</label>
              </div>
            </div>
          </div>
        </details>

        <!-- Section: 通胀率 -->
        <details class="cfg-section" open>
          <summary>通胀率</summary>
          <div class="section-body">
            <div class="field-row">
              <label>基准值<input type="number" id="f_infl_val" value="3" class="fnum pct" step="0.1"> %</label>
              <label>分布
                <select id="f_infl_dist" class="fdist">
                  <option value="fixed">固定值</option>
                  <option value="normal" selected>正态 N</option>
                  <option value="uniform">均匀 U</option>
                </select>
              </label>
            </div>
            <div class="dist-params" data-target="f_infl_dist">
              <div class="field-row" data-dist="normal" style="display:flex">
                <label>均值<input type="number" id="f_infl_n_mean" value="3" class="fnum pct" step="0.1"> %</label>
                <label>标准差<input type="number" id="f_infl_n_std" value="2" class="fnum pct" step="0.1"> %</label>
              </div>
              <div class="field-row" data-dist="uniform" style="display:none">
                <label>下限<input type="number" id="f_infl_u_lo" value="1" class="fnum pct" step="0.1"> %</label>
                <label>上限<input type="number" id="f_infl_u_hi" value="5" class="fnum pct" step="0.1"> %</label>
              </div>
            </div>
          </div>
        </details>

        <!-- Section: 人生事件 -->
        <details class="cfg-section" open>
          <summary>人生事件</summary>
          <div class="section-body">
            <div id="eventList" class="event-list"></div>
            <button id="addEventBtn" class="btn btn-sm" style="margin-top:8px">+ 添加事件</button>
          </div>
        </details>
      </div>

      <!-- ═══ Expert Mode (Raw Text) ═══ -->
      <div id="expertMode" style="display:none;flex:1;flex-direction:column">
        <textarea id="configEditor" spellcheck="false"></textarea>
      </div>

      <!-- Run bar -->
      <div class="run-bar">
        <label class="samples-label">
          样本数:
          <select id="samplesSelect">
            <option value="50">50 (快速)</option>
            <option value="100">100</option>
            <option value="200" selected>200 (推荐)</option>
            <option value="500">500 (精确)</option>
          </select>
        </label>
        <button id="runBtn" class="btn btn-primary">▶ 运行模拟</button>
      </div>
    </section>

    <!-- ─── Right: Results ─── -->
    <section class="results-panel">
      <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loadingText">正在加载 Pyodide ...</p>
      </div>
      <div id="placeholder" class="placeholder">
        <p>配置参数并点击「运行模拟」开始</p>
      </div>
      <div id="resultsContent" class="results-content hidden">
        <div class="result-section">
          <h3>确定性模拟最终状态</h3>
          <div class="stat-grid" id="detStats"></div>
        </div>
        <div class="result-section">
          <h3>蒙特卡洛模拟统计</h3>
          <div class="stat-grid" id="mcStats"></div>
        </div>
        <div class="result-section">
          <h3>事件日志 (样本 1)</h3>
          <div class="event-log" id="eventLog"></div>
        </div>
        <div class="result-section">
          <h3>财务自由概率</h3>
          <div class="fi-table-wrap" id="fiTable"></div>
        </div>
        <div class="result-section">
          <h3>图表</h3>
          <div class="plot-grid" id="plotGrid"></div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- ═══ Event Modal ═══ -->
<div id="eventModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">添加事件</h3>
      <button id="modalCloseBtn" class="btn btn-sm">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="em_edit_idx" value="-1">
      <div class="field-row">
        <label>事件类型
          <select id="em_type" class="fdist">
            <option value="marriage">结婚</option>
            <option value="birth">生子</option>
            <option value="buy_house">买房</option>
            <option value="buy_car">买车</option>
            <option value="job_change">换工作</option>
            <option value="change_living_expense">改变生活成本</option>
            <option value="change_invest_return">改变投资回报</option>
            <option value="retirement">退休</option>
            <option value="redistribute_invest">投资再平衡</option>
          </select>
        </label>
      </div>
      <div id="em_trigger_row" class="field-row">
        <label>触发年份
          <input type="number" id="em_trigger_year" value="2030" class="fnum" style="width:100px">
        </label>
        <label class="chk-label" id="em_trigger_auto_label"><input type="checkbox" id="em_trigger_auto"> 每年触发 (auto)</label>
      </div>

      <!-- Event-specific fields (shown/hidden by type) -->
      <div id="em_fields">
        <!-- marriage -->
        <div class="em-fields-group" data-type="marriage">
          <div class="field-row">
            <label>配偶收入<input type="number" id="em_marriage_income" value="100000" class="fnum"></label>
            <label>额外支出<input type="number" id="em_marriage_expense" value="30000" class="fnum"></label>
          </div>
        </div>
        <!-- birth -->
        <div class="em-fields-group" data-type="birth">
          <div class="field-row">
            <label>育儿年支出<input type="number" id="em_birth_cost" value="30000" class="fnum"></label>
            <label>教育起龄<input type="number" id="em_birth_edu_start" value="6" class="fnum"></label>
          </div>
          <div class="field-row">
            <label>教育年支出<input type="number" id="em_birth_edu_cost" value="10000" class="fnum"></label>
          </div>
        </div>
        <!-- buy_house -->
        <div class="em-fields-group" data-type="buy_house">
          <div class="field-row">
            <label>房价<input type="number" id="em_bh_price" value="3000000" class="fnum"></label>
            <label>首付%<input type="number" id="em_bh_down" value="30" class="fnum pct"></label>
          </div>
          <div class="field-row">
            <label>贷款年数<input type="number" id="em_bh_years" value="30" class="fnum"></label>
            <label>利率%<input type="number" id="em_bh_rate" value="3.5" class="fnum pct" step="0.1"></label>
          </div>
          <div class="field-row">
            <label>年增值%<input type="number" id="em_bh_appr" value="3" class="fnum pct" step="0.1"></label>
          </div>
        </div>
        <!-- buy_car -->
        <div class="em-fields-group" data-type="buy_car">
          <div class="field-row">
            <label>车价<input type="number" id="em_bc_price" value="100000" class="fnum"></label>
            <label>首付%<input type="number" id="em_bc_down" value="50" class="fnum pct"></label>
          </div>
          <div class="field-row">
            <label>贷款年数<input type="number" id="em_bc_years" value="3" class="fnum"></label>
            <label>利率%<input type="number" id="em_bc_rate" value="2.6" class="fnum pct" step="0.1"></label>
          </div>
        </div>
        <!-- job_change -->
        <div class="em-fields-group" data-type="job_change">
          <div class="field-row radio-row">
            <label><input type="radio" name="jc_mode" value="salary" checked> 新薪资</label>
            <label><input type="radio" name="jc_mode" value="pct"> 涨薪比例</label>
            <label><input type="radio" name="jc_mode" value="value"> 涨薪金额</label>
          </div>
          <div class="field-row jc-dist-group">
            <label>新薪资基准<input type="number" id="em_jc_salary" value="300000" class="fnum"></label>
            <label>分布
              <select id="em_jc_dist" class="fdist">
                <option value="fixed">固定值</option>
                <option value="normal" selected>正态 N</option>
                <option value="uniform">均匀 U</option>
              </select>
            </label>
          </div>
          <div class="em-dist-params" data-target="em_jc_dist">
            <div class="field-row jc-dist-group" data-dist="normal" style="display:flex">
              <label>均值<input type="number" id="em_jc_n_mean" value="300000" class="fnum"></label>
              <label>标准差<input type="number" id="em_jc_n_std" value="30000" class="fnum"></label>
            </div>
            <div class="field-row jc-dist-group" data-dist="uniform" style="display:none">
              <label>下限<input type="number" id="em_jc_u_lo" value="270000" class="fnum"></label>
              <label>上限<input type="number" id="em_jc_u_hi" value="330000" class="fnum"></label>
            </div>
          </div>
          <div class="field-row jc-pct-row" style="display:none">
            <label>涨薪比例<input type="number" id="em_jc_pct" value="10" class="fnum pct" step="0.1"> %</label>
          </div>
          <div class="field-row jc-value-row" style="display:none">
            <label>涨薪金额<input type="number" id="em_jc_value" value="50000" class="fnum"></label>
          </div>
        </div>
        <!-- change_living_expense -->
        <div class="em-fields-group" data-type="change_living_expense">
          <div class="field-row radio-row">
            <label><input type="radio" name="cle_mode" value="expense" checked> 新支出</label>
            <label><input type="radio" name="cle_mode" value="pct"> 调整比例</label>
            <label><input type="radio" name="cle_mode" value="value"> 调整金额</label>
          </div>
          <div class="field-row cle-dist-group">
            <label>新支出基准<input type="number" id="em_cle_expense" value="120000" class="fnum"></label>
            <label>分布
              <select id="em_cle_dist" class="fdist">
                <option value="fixed">固定值</option>
                <option value="normal" selected>正态 N</option>
                <option value="uniform">均匀 U</option>
              </select>
            </label>
          </div>
          <div class="em-dist-params" data-target="em_cle_dist">
            <div class="field-row cle-dist-group" data-dist="normal" style="display:flex">
              <label>均值<input type="number" id="em_cle_n_mean" value="120000" class="fnum"></label>
              <label>标准差<input type="number" id="em_cle_n_std" value="10000" class="fnum"></label>
            </div>
            <div class="field-row cle-dist-group" data-dist="uniform" style="display:none">
              <label>下限<input type="number" id="em_cle_u_lo" value="110000" class="fnum"></label>
              <label>上限<input type="number" id="em_cle_u_hi" value="130000" class="fnum"></label>
            </div>
          </div>
          <div class="field-row cle-pct-row" style="display:none">
            <label>调整比例<input type="number" id="em_cle_pct" value="10" class="fnum pct" step="0.1"> %</label>
          </div>
          <div class="field-row cle-value-row" style="display:none">
            <label>调整金额<input type="number" id="em_cle_value" value="10000" class="fnum"></label>
          </div>
        </div>
        <!-- change_invest_return -->
        <div class="em-fields-group" data-type="change_invest_return">
          <div class="field-row">
            <label>新回报率%<input type="number" id="em_cir_val" value="6" class="fnum pct" step="0.1"></label>
            <label>分布
              <select id="em_cir_dist" class="fdist">
                <option value="fixed">固定值</option>
                <option value="normal" selected>正态 N</option>
                <option value="uniform">均匀 U</option>
              </select>
            </label>
          </div>
          <div class="em-dist-params" data-target="em_cir_dist">
            <div class="field-row" data-dist="normal" style="display:flex">
              <label>均值%<input type="number" id="em_cir_n_mean" value="4" class="fnum pct" step="0.1"></label>
              <label>标准差%<input type="number" id="em_cir_n_std" value="2" class="fnum pct" step="0.1"></label>
            </div>
            <div class="field-row" data-dist="uniform" style="display:none">
              <label>下限%<input type="number" id="em_cir_u_lo" value="3" class="fnum pct" step="0.1"></label>
              <label>上限%<input type="number" id="em_cir_u_hi" value="9" class="fnum pct" step="0.1"></label>
            </div>
          </div>
        </div>
        <!-- retirement & redistribute_invest: no extra fields -->
        <div class="em-fields-group" data-type="retirement">
          <p class="em-hint">退休：工资归零，生活费降至 70%</p>
        </div>
        <div class="em-fields-group" data-type="redistribute_invest">
          <p class="em-hint">投资再平衡：将超额现金转入投资。可选择「每年触发」或在指定年份触发。</p>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="modalCancelBtn" class="btn">取消</button>
      <button id="modalSaveBtn" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
