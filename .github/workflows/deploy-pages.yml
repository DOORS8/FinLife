# Deploy FinLife Web to GitHub Pages
# URL: https://<user>.github.io/FinLife/
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Copy core Python modules + web/ into a single deploy root
      - run: |
          mkdir -p _site
          cp lifeclass.py config_parser.py events_factory.py _site/
          cp -r web/* _site/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4